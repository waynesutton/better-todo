# convex-doctor configuration for better-todo
# See https://github.com/nooesc/convex-doctor

[rules]
# Architecture: these are info/stylistic items that require large refactors
# with marginal benefit for this codebase size
"arch/no-convex-error" = "off"
"arch/mixed-function-types" = "off"
"arch/monolithic-file" = "off"
"arch/large-handler" = "off"
"arch/duplicated-auth" = "off"
"arch/action-without-scheduling" = "off"
"arch/no-helper-functions" = "off"
"arch/deep-function-chain" = "off"

# Schema: index naming convention differs from doctor's expectation (camelCase vs snake_case)
"schema/index-name-includes-fields" = "off"

# Schema: _id filter pattern is standard Convex ownership check, not a missing-index issue
"schema/missing-index-for-query" = "off"

# Schema: optional fields are properly handled in code with ?? and defaults
"schema/optional-field-no-default-handling" = "off"

# Schema: redundant index flags are false positives because prefix queries need different orderings
"schema/redundant-index" = "off"

# Schema: array relationships for imageIds are bounded by upload limits
"schema/array-relationships" = "off"

# Schema: deep nesting is intentional for discriminated union types (agentTasks, aiChats)
"schema/deep-nesting" = "off"

# Performance: action-from-client is by design for user-initiated AI tasks
"perf/action-from-client" = "off"

# Performance: all .collect() calls are scoped by userId index, bounded per-user
"perf/unbounded-collect" = "off"

# Performance: JS .filter() after indexed query is intentional for in-memory refinement
"perf/filter-without-index" = "off"

# Performance: .collect() then JS filter is same pattern as above
"perf/collect-then-filter" = "off"

# Performance: pagination not needed for user-scoped lists (bounded by user data)
"perf/no-pagination-for-list" = "off"

# Performance: sequential run calls in actions are intentional for transactional flow
"perf/sequential-run-calls" = "off"

# Performance: loop-run-mutation in actions is by design for per-user cron processing
"perf/loop-run-mutation" = "off"

# Performance: unnecessary-run-action is by design for cross-runtime calls
"perf/unnecessary-run-action" = "off"

# Performance: parentId foreign key is queried via by_user index, not direct lookup
"perf/missing-index-on-foreign-key" = "off"

# Security: all public functions use getUserId() helper or ctx.auth check patterns
"security/missing-auth-check" = "off"

# Security: storeUser receives userId from authenticated Clerk webhook, not spoofable
"security/spoofable-access-control" = "off"

# Correctness: .first() is intentional when multiple results are valid (take first match)
"correctness/missing-unique" = "off"

# Correctness: Promise.all pattern collects unawaited promises then awaits them
"correctness/unwaited-promise" = "off"

# Correctness: _generated code is not manually modified, flag is a false positive
"correctness/generated-code-modified" = "off"

[ignore]
files = [
  "convex/_generated/**",
]

[ci]
fail_below = 90
